<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Header container */
        .top-header {
            display: flex;
            align-items: center;
            padding: 10px 20px;
        }

        .top-header img {
            height: 60px; /* adjust size */
            margin-right: 20px;
        }

        /* Thin black line */
        .divider {
            width: 100%;
            height: 1px;
            background-color: black;
            margin-top: 5px;
        }

        /* Navigation menu */
        nav {
            display: flex;
            gap: 30px;
            padding: 15px 20px;
            font-size: 18px;
        }

        nav a {
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        nav a:hover {
            color: #555;
        }
    </style>
</head>

<body>

    <!-- LOGO + IMAGE -->
    <div class="top-header">
        <img src="The Global M&A Advisory4final" alt="Logo"> 
        <img src="Gulfmaster_ban" alt="Second Image">
    </div>

    <!-- THIN BLACK LINE -->
    <div class="divider"></div>

    <!-- NAVIGATION HEADINGS -->
    <nav>
        <a href="index.html">Home</a>
        <a href="about-us.html">About Us</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
    </nav>

</body>
</html>
